version: "3.9"

services:

  # ─── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ric_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ric_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ric_dev_password_change_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-ric_conductor}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/seed_ric_tables.sql:/docker-entrypoint-initdb.d/01_ric_tables.sql:ro
      - ./db/seed_proveedores.sql:/docker-entrypoint-initdb.d/02_proveedores.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ric_user} -d ${POSTGRES_DB:-ric_conductor}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ric_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ─── Backend FastAPI ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ric_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ric_user}:${POSTGRES_PASSWORD:-ric_dev_password_change_in_prod}@postgres:5432/${POSTGRES_DB:-ric_conductor}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # ─── Frontend Next.js ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: ric_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      BACKEND_URL: http://backend:8000
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev_nextauth_secret_change_in_prod}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ─── PDF Service (Puppeteer) ────────────────────────────────────────────────
  pdf-service:
    build:
      context: ./pdf-service
      dockerfile: Dockerfile
    container_name: ric_pdf
    restart: unless-stopped
    ports:
      - "9001:9000"
    environment:
      NODE_ENV: production
      PORT: 9000

volumes:
  postgres_data:

networks:
  default:
    name: ric_network
